<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${compra.id == 0} ? 'Agregar Compra' : 'Editar Compra'"></h2>

    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/compras/guardar}" th:object="${compra}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label for="idUsuario" class="form-label">ID Usuario</label>
            <input type="number" class="form-control" id="idUsuario" th:field="*{id_usuario}" min="1" required />
        </div>

        <div class="mb-3">
            <label for="fecha" class="form-label">Fecha</label>
            <input type="date" class="form-control" id="fecha" th:field="*{fecha}" min="1900-01-01" max="9999-12-31" required />
            <div class="text-danger" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
        </div>

        <div class="mb-3">
            <label for="total" class="form-label">Total</label>
            <input type="number" class="form-control" id="total" th:field="*{total}" step="0.01" min="0" required />
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/compras}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
