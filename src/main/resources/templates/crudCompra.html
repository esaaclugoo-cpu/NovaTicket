<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Compras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Compras</h2>
        <div>
            <a th:href="@{/admin}" class="btn btn-outline-secondary me-2">Volver a /admin</a>
            <a th:href="@{/compras/nuevo}" class="btn btn-success">Nueva Compra</a>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>ID Usuario</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(compras)}">
            <td colspan="5" class="text-center">No hay compras registradas.</td>
        </tr>
        <tr th:each="compra : ${compras}">
            <td th:text="${compra.id}"></td>
            <td th:text="${compra.id_usuario}"></td>
            <td th:text="${compra.fecha}"></td>
            <td th:text="${compra.total}"></td>
            <td>
                <a th:href="@{/compras/editar/{id}(id=${compra.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/compras/eliminar/{id}(id=${compra.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
