<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Eventos</h2>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Imagen</th>
            <th>ID</th>
            <th>Tipo Evento</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Nombre Lugar</th>
            <th>Dirección</th>
            <th>Ciudad</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="evento : ${eventos}">
            <td>
                <img th:if="${evento.ruta_imagen != null and !#strings.isEmpty(evento.ruta_imagen)}"
                     th:src="@{/uploads/{img}(img=${evento.ruta_imagen})}"
                     width="80"
                     alt="Imagen del evento">
                <span th:unless="${evento.ruta_imagen != null and !#strings.isEmpty(evento.ruta_imagen)}">Sin imagen</span>
            </td>
            <td th:text="${evento.id}"></td>
            <td th:text="${evento.tipo_evento}"></td>
            <td th:text="${evento.nombre}"></td>
            <td th:text="${evento.descripcion}"></td>
            <td th:text="${evento.nombre_lugar}"></td>
            <td th:text="${evento.direccion}"></td>
            <td th:text="${evento.ciudad}"></td>
            <td th:text="${evento.fecha}"></td>
            <td>
                <a th:href="@{/eventos/editar/{id}(id=${evento.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/eventos/eliminar/{id}(id=${evento.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
