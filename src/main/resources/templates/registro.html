<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro de cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5" style="max-width: 520px;">
    <h1 class="h3 mb-4">Crear cuenta</h1>
    <p class="text-muted">Las cuentas registradas aqui se crean como cliente.</p>

    <div th:if="${errorMensaje}" class="alert alert-danger" th:text="${errorMensaje}"></div>

    <form th:action="@{/registro}" method="post" class="card card-body shadow-sm">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input id="nombre" name="nombre" type="text" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" name="email" type="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contrasena</label>
            <input id="password" name="password" type="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Registrarme</button>
    </form>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/login}" class="btn btn-outline-primary">Ya tengo cuenta</a>
        <a th:href="@{/cliente/home}" class="btn btn-outline-secondary">Volver al home</a>
    </div>
</div>
</body>
</html>
