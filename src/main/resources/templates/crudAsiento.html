<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Asientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="admin-panel">
<header>
    <nav class="nt-navbar nt-navbar-admin" aria-label="Navegacion asientos admin">
        <div class="container position-relative d-flex justify-content-center align-items-center">
            <a th:href="@{/admin}" class="nt-admin-back btn btn-outline-secondary btn-sm">Volver a admin</a>
            <a th:href="@{/admin}" class="nt-brand" aria-label="Panel admin NovaTicket">
                <img th:src="@{/img/logo2.png}" src="/img/logo2.png" alt="NovaTicket" class="nt-logo">
            </a>
        </div>
    </nav>
</header>

<div class="container mt-4 crud-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Asientos</h2>
        <div>
            <a th:href="@{/admin}" class="btn btn-outline-secondary me-2">Volver a admin</a>
            <a th:href="@{/asientos/nuevo}" class="btn btn-primary">Nuevo Asiento</a>
        </div>
    </div>

    <div class="table-responsive">
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Lugar</th>
            <th>Fila</th>
            <th>Numero Asiento</th>
            <th>Zona</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(asientos)}">
            <td colspan="6" class="text-center">No hay asientos registrados.</td>
        </tr>
        <tr th:each="asiento : ${asientos}">
            <td th:text="${asiento.id}"></td>
            <td th:text="${lugares[asiento.id_lugar] != null ? lugares[asiento.id_lugar] : 'ID ' + asiento.id_lugar}"></td>
            <td th:text="${asiento.fila}"></td>
            <td th:text="${asiento.numero_asiento}"></td>
            <td th:text="${asiento.zona}"></td>
            <td>
                <a th:href="@{/asientos/editar/{id}(id=${asiento.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/asientos/eliminar/{id}(id=${asiento.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</div>
</body>
</html>
