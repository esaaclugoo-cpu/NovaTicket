<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Asientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Asientos</h2>
        <a th:href="@{/asientos/nuevo}" class="btn btn-success">Nuevo Asiento</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>ID Lugar</th>
            <th>Fila</th>
            <th>Numero Asiento</th>
            <th>Zona</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(asientos)}">
            <td colspan="6" class="text-center">No hay asientos registrados.</td>
        </tr>
        <tr th:each="asiento : ${asientos}">
            <td th:text="${asiento.id}"></td>
            <td th:text="${asiento.id_lugar}"></td>
            <td th:text="${asiento.fila}"></td>
            <td th:text="${asiento.numero_asiento}"></td>
            <td th:text="${asiento.zona}"></td>
            <td>
                <a th:href="@{/asientos/editar/{id}(id=${asiento.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/asientos/eliminar/{id}(id=${asiento.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
