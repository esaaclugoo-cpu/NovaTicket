<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NovaTicket - Home Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Eventos disponibles</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/cliente/carrito}" class="btn btn-success"
               th:text="'Carrito (' + ${carritoCantidad} + ')'">Carrito</a>
            <a th:href="@{/admin}" class="btn btn-outline-secondary">Panel admin</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="evento : ${eventos}">
            <div class="card h-100 shadow-sm">
                <img th:if="${evento.ruta_imagen != null and !#strings.isEmpty(evento.ruta_imagen)}"
                     th:src="@{/uploads/{img}(img=${evento.ruta_imagen})}"
                     class="card-img-top"
                     alt="Imagen evento"
                     style="height: 220px; object-fit: cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${evento.nombre}"></h5>
                    <p class="card-text text-muted" th:text="${evento.descripcion}"></p>
                    <p class="mb-1"><strong>Fecha:</strong> <span th:text="${evento.fecha}"></span></p>
                    <p class="mb-1"><strong>Precios:</strong> General 25 EUR / VIP 50 EUR / Premium 80 EUR</p>
                    <p class="mb-3"><strong>Disponibles:</strong> <span th:text="${disponibles[evento.id]}"></span></p>
                    <a th:href="@{/cliente/evento/{id}(id=${evento.id})}"
                       class="btn btn-primary mt-auto">Ver y anadir al carrito</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
