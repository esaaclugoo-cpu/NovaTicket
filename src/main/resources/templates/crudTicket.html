<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Tickets</h2>
        <a th:href="@{/tickets/nuevo}" class="btn btn-success">Nuevo Ticket</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>ID Evento</th>
            <th>ID Asiento</th>
            <th>Tipo</th>
            <th>ID Compra</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(tickets)}">
            <td colspan="8" class="text-center">No hay tickets registrados.</td>
        </tr>
        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}"></td>
            <td th:text="${ticket.id_evento}"></td>
            <td th:text="${ticket.id_asiento != null ? ticket.id_asiento : 'Sin asiento'}"></td>
            <td th:text="${ticket.tipo}"></td>
            <td th:text="${ticket.id_compra}"></td>
            <td th:text="${ticket.cantidad}"></td>
            <td th:text="${ticket.precio_unitario}"></td>
            <td>
                <a th:href="@{/tickets/editar/{id}(id=${ticket.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/tickets/eliminar/{id}(id=${ticket.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
